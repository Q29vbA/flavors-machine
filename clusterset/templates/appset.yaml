{{- /*
  Rendered only when this chart is deployed as the clusterset Application by the flavorset appset
  (i.e. hubApps is not yet populated). Deploys one hubapps Application per cluster, using this
  same chart as the source so that hubapps.yaml below gets rendered with the real hubApps values.
*/}}
{{- if not .Values.hubApps }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: clusterset-{{ .Values.global.flavor }}-{{ .Values.global.env }}
  namespace: {{ .Values.global.argocdConfig.hub_ns }}
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: {{ .Values.global.definitionsRepo.url }}
        revision: {{ .Values.global.definitionsRepo.revision }}
        files:
          - path: '{{ .Values.global.flavor }}/{{ .Values.global.env }}/*.yaml'
  template:
    metadata:
      name: '{{`{{ .path.filename | trimSuffix ".yaml" }}`}}-{{ .Values.global.flavor }}-{{ .Values.global.env }}-hubapps'
      namespace: {{ .Values.global.argocdConfig.hub_ns }}
    spec:
      project: {{ .Values.global.argocdConfig.hub_project }}
      {{- if ne .Values.global.env "dev" }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ .Values.global.argocdConfig.hub_ns }}
      sources:
        # Source 1: this chart itself — rendered with hubApps values it loops hubapps.yaml
        - repoURL: {{ .Values.global.machineRepo.url }}
          targetRevision: {{ .Values.global.machineRepo.revision }}
          path: clusterset
          helm:
            valueFiles:
              - $hubApps/{{ .Values.global.flavor }}/hubApps.yaml
              - $clusterFile/{{ .Values.global.flavor }}/{{ .Values.global.env }}/{{`{{ .path.filename }}`}}
            values: |
              global:
                env: {{ .Values.global.env }}
                flavor: {{ .Values.global.flavor }}
                cluster: '{{`{{ .path.filename | trimSuffix ".yaml" }}`}}'
                argocdConfig:
                  hub_ns: {{ .Values.global.argocdConfig.hub_ns }}
                  hub_project: {{ .Values.global.argocdConfig.hub_project }}
                  edge_project: {{ .Values.global.argocdConfig.edge_project }}
                baseDomain: {{ .Values.global.baseDomain }}
                machineRepo:
                  url: {{ .Values.global.machineRepo.url }}
                  revision: {{ .Values.global.machineRepo.revision }}
                definitionsRepo:
                  url: {{ .Values.global.definitionsRepo.url }}
                  revision: {{ .Values.global.definitionsRepo.revision }}
        # Source 2: provides hubApps list → .Values.hubApps in the clusterset chart
        - repoURL: {{ .Values.global.definitionsRepo.url }}
          targetRevision: {{ .Values.global.definitionsRepo.revision }}
          ref: hubApps
        # Source 3: provides per-cluster overrides (clusterServer etc.) → .Values.clusterServer
        - repoURL: {{ .Values.global.definitionsRepo.url }}
          targetRevision: {{ .Values.global.definitionsRepo.revision }}
          ref: clusterFile
{{- end }}
