{{- /*
  Rendered only when this chart is deployed as a per-cluster hubapps Application by the
  clusterset appset (i.e. hubApps is non-empty, loaded from hubApps.yaml valueFile).
  Creates one ArgoCD Application on the hub per entry in .Values.hubApps.

  Two kinds of entry are supported:
    - chart entry (e.g. ca-bundle): single-source Helm chart Application.
    - path entry  (e.g. hive):      multi-source Application — the Helm chart at .path
                                    plus edgeApps.yaml and the clusterfile as extra valueFiles.
*/}}
{{- range .Values.hubApps }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Values.global.cluster }}-{{ .name }}
  namespace: {{ $.Values.global.argocdConfig.hub_ns }}
spec:
  project: {{ $.Values.global.argocdConfig.hub_project }}
  {{- if ne $.Values.global.env "dev" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Values.global.argocdConfig.hub_ns }}
  {{- if eq .name "hive" }}
  {{- /* Hive: multi-source — Helm chart + edgeApps.yaml + clusterfile as valueFiles */}}
  sources:
    - repoURL: {{ .repoURL }}
      targetRevision: {{ .targetRevision }}
      path: {{ .path }}
      helm:
        valueFiles:
          - $edgeApps/{{ $.Values.global.flavor }}/edgeApps.yaml
          - $clusterFile/{{ $.Values.global.flavor }}/{{ $.Values.global.env }}/{{ $.Values.global.cluster }}.yaml
        values: |
          global:
            {{- $.Values.global | toYaml | nindent 12 }}
    - repoURL: {{ $.Values.global.definitionsRepo.url }}
      targetRevision: {{ $.Values.global.definitionsRepo.revision }}
      ref: edgeApps
    - repoURL: {{ $.Values.global.definitionsRepo.url }}
      targetRevision: {{ $.Values.global.definitionsRepo.revision }}
      ref: clusterFile
  {{- else }}
  {{- /* Regular Helm chart hub app — source fields taken verbatim from the hubApps list entry */}}
  source:
    {{- omit . "name" "namespace" | toYaml | nindent 4 }}
  {{- end }}
{{- end }}
