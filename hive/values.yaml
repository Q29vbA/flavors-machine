global:
  env: dev
  flavor: gpu-enabled
  cluster: gpu-cluster-dev
  argocdConfig:
    hub_ns: argocd
    edge_project: default
  baseDomain: hub.example.com
  machineRepo:
    url: https://github.com/my-org/flavors-machine
    revision: feat/flavor-bootstrap
  definitionsRepo:
    url: https://github.com/my-org/flavors-definition
    revision: feat/flavor-bootstrap

# Populated via hubApps.yaml valueFile from the definitions repo.
hubApps: []
