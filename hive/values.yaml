#   chart: podinfo
#   targetRevision: "6.7.0"
#   namespace: ca-bundle

# Populated via edgeApps.yaml valueFile from the definitions repo.
edgeApps: []
# Example entry:
# - name: edge-podinfo-primary
#   repoURL: https://stefanprodan.github.io/podinfo
#   chart: podinfo
#   targetRevision: "6.7.0"
#   namespace: podinfo-primary

# Destination cluster server URL for the edge cluster.
clusterServer: https://gpu-cluster-dev.example.com
